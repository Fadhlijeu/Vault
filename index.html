<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl text-center space-y-6">
        
        <div>
            <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                CYBER VAULT
            </h1>
            <p class="text-sm text-slate-400 mt-2">Sistem Penyimpanan Terenkripsi</p>
        </div>

        <div class="space-y-4">
            <div class="text-left">
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Access Token</label>
                <input type="password" id="tokenInput" placeholder="Masukkan token rahasia..." 
                       class="input-cyber w-full mt-1 px-4 py-3 rounded-lg text-sm"
                       autocomplete="off">
            </div>
            <button id="loginBtn" class="btn-cyber w-full py-3 rounded-lg font-bold tracking-wide cursor-pointer uppercase text-sm">
                Buka Brankas
            </button>
        </div>
        
        <p id="errorMsg" class="text-red-400 text-xs hidden animate-pulse">Token tidak boleh kosong!</p>
    </div>

    <script type="module">
        import { login, checkToken } from './src/auth.js';

        // Kalau udah login sebelumnya, langsung lempar ke dashboard
        if (checkToken()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const token = document.getElementById('tokenInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (token) {
                login(token);
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        // Dukungan tekan "Enter" di keyboard
        document.getElementById('tokenInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
