<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl text-center space-y-6 relative">
        <!-- Settings Toggle (Gear Icon) -->
        <button id="toggleSettingsBtn" class="absolute top-4 right-4 text-slate-500 hover:text-cyan-400 transition cursor-pointer text-sm" title="Pengaturan URL Backend">
            ⚙️ Setup
        </button>
        
        <div>
            <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                CYBER VAULT
            </h1>
            <p class="text-sm text-slate-400 mt-2">Sistem Penyimpanan Terenkripsi</p>
        </div>

        <!-- Hidden Settings Section -->
        <div id="settingsSection" class="hidden text-left border-b border-white/5 pb-4 space-y-3">
            <label class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Google Apps Script Web App URL</label>
            <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" 
                   class="input-cyber w-full px-4 py-2 rounded-lg text-xs"
                   autocomplete="off">
            <button id="saveSettingsBtn" class="w-full py-2 bg-cyan-500/10 hover:bg-cyan-500 text-cyan-400 hover:text-white rounded-lg text-[10px] font-bold uppercase tracking-wider transition cursor-pointer">
                Simpan URL Secara Lokal
            </button>
        </div>

        <div class="space-y-4">
            <div class="text-left">
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Access Token</label>
                <div class="relative mt-1">
                    <input type="password" id="tokenInput" placeholder="Masukkan token rahasia..." 
                           class="input-cyber w-full pl-4 pr-10 py-3 rounded-lg text-sm"
                           autocomplete="off">
                    <button id="togglePwBtn" type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-cyan-400 transition cursor-pointer text-xs" title="Tampilkan/Sembunyikan Token">
                        👁️
                    </button>
                </div>
            </div>
            <button id="loginBtn" class="btn-cyber w-full py-3 rounded-lg font-bold tracking-wide cursor-pointer uppercase text-sm">
                Buka Brankas
            </button>
        </div>
        
        <p id="errorMsg" class="text-red-400 text-xs hidden animate-pulse">Token tidak boleh kosong!</p>
    </div>

    <!-- Beautiful Cyber Notification Toast -->
    <div id="settingsToast" class="hidden fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-900 border border-cyan-500/30 text-cyan-400 text-xs px-5 py-3.5 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.2)] font-mono-cyber z-50 animate-bounce">
        ⚡ URL Script berhasil disimpan!
    </div>

    <script type="module">
        import { login, checkToken } from './src/auth.js';

        // Kalau udah login sebelumnya, langsung lempar ke dashboard
        if (checkToken()) {
            window.location.href = 'dashboard.html';
        }

        // Logic Panel Pengaturan (Lokal Browser saja, tidak dikirim ke Git)
        const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
        const settingsSection = document.getElementById('settingsSection');
        const apiUrlInput = document.getElementById('apiUrlInput');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const settingsToast = document.getElementById('settingsToast');

        const togglePwBtn = document.getElementById('togglePwBtn');
        const tokenInput = document.getElementById('tokenInput');

        // Toggle Pw Visibility
        togglePwBtn.addEventListener('click', () => {
            if (tokenInput.type === 'password') {
                tokenInput.type = 'text';
                togglePwBtn.innerText = '🔒';
            } else {
                tokenInput.type = 'password';
                togglePwBtn.innerText = '👁️';
            }
        });

        function showSettingsToast(msg) {
            settingsToast.innerText = `⚡ ${msg}`;
            settingsToast.classList.remove('hidden');
            setTimeout(() => {
                settingsToast.classList.add('hidden');
            }, 3000);
        }

        // Load existing API URL jika ada di browser local storage
        if (localStorage.getItem('vault_api_url')) {
            apiUrlInput.value = localStorage.getItem('vault_api_url');
        }

        toggleSettingsBtn.addEventListener('click', () => {
            settingsSection.classList.toggle('hidden');
        });

        saveSettingsBtn.addEventListener('click', () => {
            const url = apiUrlInput.value.trim();
            if (url) {
                localStorage.setItem('vault_api_url', url);
                showSettingsToast("URL Google Apps Script berhasil disimpan secara lokal!");
                settingsSection.classList.add('hidden');
            } else {
                localStorage.removeItem('vault_api_url');
                showSettingsToast("URL Google Apps Script dihapus.");
                settingsSection.classList.add('hidden');
            }
        });

        // Trigger Login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            if (token) {
                loginBtn.innerText = "AUTHENTICATING...";
                loginBtn.disabled = true;
                errorMsg.classList.add('hidden');
                
                const result = await login(token);
                if (result.status === "success") {
                    window.location.href = 'dashboard.html';
                } else {
                    loginBtn.innerText = "Buka Brankas";
                    loginBtn.disabled = false;
                    errorMsg.innerText = result.message;
                    errorMsg.classList.remove('hidden');
                }
            } else {
                errorMsg.innerText = "Token tidak boleh kosong!";
                errorMsg.classList.remove('hidden');
            }
        });

        // Dukungan tekan "Enter" di keyboard
        tokenInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
