<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Vault v2.0</title>
    <!-- Tailwind CSS untuk Desain Instan Keren -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d1117; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-[#161b22] border border-[#30363d] rounded-xl shadow-2xl p-6 space-y-6">
        
        <!-- Header -->
        <div class="text-center border-b border-[#30363d] pb-4">
            <h1 class="text-2xl font-bold text-blue-500 tracking-wide">🔒 CYBER VAULT</h1>
            <p class="text-xs text-gray-400 mt-1">Sistem Penyimpanan Awan Pribadi Berbasis Token</p>
        </div>

        <!-- Keamanan / Token Input -->
        <div class="space-y-2">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Gerbang Akses (Token)</label>
            <input type="password" id="tokenInput" placeholder="Masukkan password token vault lu..." 
                   class="w-full px-4 py-2.5 bg-[#0d1117] border border-[#30363d] rounded-lg focus:outline-none focus:border-blue-500 text-sm">
        </div>

        <!-- Area Upload (Add) -->
        <div class="space-y-3 bg-[#0d1117] p-4 rounded-lg border border-[#21262d]">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider block">Upload File Baru</label>
            
            <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-[#30363d] border-dashed rounded-lg cursor-pointer hover:bg-[#161b22] hover:border-blue-500 transition">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <p class="text-sm text-gray-400"><span class="font-semibold text-blue-400">Klik untuk pilih file</span></p>
                    <p id="fileNamePreview" class="text-xs text-gray-500 mt-1 truncate max-w-xs">Belum ada file dipilih</p>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="updateFilePreview()" />
            </label>

            <button onclick="uploadKeDrive()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-lg transition text-sm cursor-pointer shadow-md">
                Kirim ke Vault 🚀
            </button>
        </div>

        <!-- Status & Progress -->
        <div id="statusArea" class="hidden space-y-2 text-center text-sm p-3 rounded-lg">
            <p id="statusText" class="font-medium"></p>
        </div>

    </div>

<script>
    // Taruh URL Web App Google Apps Script lu di sini
    const WEB_APP_URL = "PASTE_URL_WEB_APP_LU_DI_SINI";

    function updateFilePreview() {
        const input = document.getElementById('fileInput');
        const preview = document.getElementById('fileNamePreview');
        if(input.files.length > 0) {
            preview.innerText = input.files[0].name;
            preview.classList.remove('text-gray-500');
            preview.classList.add('text-green-400');
        }
    }

    function uploadKeDrive() {
        const fileInput = document.getElementById('fileInput');
        const tokenInput = document.getElementById('tokenInput');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        
        if (!tokenInput.value) {
            alert("Isi token akses lu dulu di atas!");
            return;
        }
        if (fileInput.files.length === 0) {
            alert("Pilih file yang mau diupload!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        // Show status loading
        statusArea.className = "block bg-blue-950/40 border border-blue-800 text-blue-400 p-3 rounded-lg text-center text-sm";
        statusText.innerText = "⏳ Sedang memproses dan mengonversi file...";

        reader.onload = function(e) {
            const base64Data = e.target.result.split(',')[1];
            const payload = {
                token: tokenInput.value, // Kirim token keamanan ke Google Script
                base64: base64Data,
                type: file.type,
                name: file.name
            };

            statusText.innerText = "🚀 Mengirim data ke enkripsi cloud Google...";

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    statusArea.className = "block bg-green-950/40 border border-green-800 text-green-400 p-3 rounded-lg text-center text-sm";
                    statusText.innerText = "✅ Sukses! File berhasil masuk brankas.";
                    fileInput.value = ""; 
                    document.getElementById('fileNamePreview').innerText = "Belum ada file dipilih";
                    document.getElementById('fileNamePreview').className = "text-xs text-gray-500 mt-1";
                } else {
                    statusArea.className = "block bg-red-950/40 border border-red-800 text-red-400 p-3 rounded-lg text-center text-sm";
                    statusText.innerText = "❌ Gagal: " + data.message;
                }
            })
            .catch(err => {
                statusArea.className = "block bg-red-950/40 border border-red-800 text-red-400 p-3 rounded-lg text-center text-sm";
                statusText.innerText = "❌ Terjadi masalah koneksi atau token salah.";
                console.error(err);
            });
        };

        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
