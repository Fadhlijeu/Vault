<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="glass-panel flex flex-col sm:flex-row justify-between items-center p-5 rounded-2xl gap-4">
            <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full bg-cyan-400 animate-pulse"></div>
                <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                    CYBER VAULT MAIN PANEL
                </h1>
            </div>
            <button id="logoutBtn" class="px-4 py-2 border border-red-500/30 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white rounded-lg text-xs font-semibold tracking-wider transition cursor-pointer uppercase">
                Disconnect Vault
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="glass-panel p-5 rounded-2xl space-y-4 h-fit">
                <h2 class="text-sm font-bold text-cyan-400 uppercase tracking-widest border-b border-white/5 pb-2">📤 Upload Engine</h2>
                
                <div id="dropZone" class="flex flex-col items-center justify-center w-full h-40 border border-dashed border-white/10 rounded-xl cursor-pointer hover:border-cyan-500/50 hover:bg-white/5 transition p-4 text-center">
                    <p class="text-xs font-semibold text-slate-400" id="dropZoneText">Drag & Drop file di sini atau klik untuk memilih</p>
                    <input type="file" id="fileInput" class="hidden" />
                </div>
                
                <button id="uploadBtn" class="btn-cyber w-full py-2.5 rounded-lg text-xs font-bold uppercase tracking-wider cursor-pointer">
                    Execute Upload 🚀
                </button>
                
                <div id="statusConsole" class="hidden text-xs p-3 rounded-lg border border-white/5 bg-black/40 font-mono text-slate-400"></div>
            </div>

            <div class="lg:col-span-3 glass-panel p-5 rounded-2xl space-y-4">
                
                <div class="flex flex-col sm:flex-row justify-between items-center gap-3 border-b border-white/5 pb-4">
                    <input type="text" id="searchBar" placeholder="Cari file di brankas secara real-time..." 
                           class="input-cyber w-full sm:max-w-xs px-4 py-2 rounded-lg text-xs">
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                        <button id="setViewList" class="p-2 border border-white/5 bg-white/5 rounded-lg text-xs font-bold hover:text-cyan-400 transition cursor-pointer">📝 List</button>
                        <button id="setViewGrid" class="p-2 border border-white/5 bg-white/5 rounded-lg text-xs font-bold hover:text-cyan-400 transition cursor-pointer">📱 Grid</button>
                    </div>
                </div>

                <div id="fileViewer" class="min-h-[400px]">
                    </div>
            </div>

        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div class="glass-panel w-full max-w-3xl p-6 rounded-2xl space-y-4 relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-white text-lg font-bold cursor-pointer">&times;</button>
            <h3 id="modalTitle" class="text-sm font-semibold truncate pr-8 text-cyan-400">Preview File</h3>
            <div id="modalBody" class="w-full flex justify-center items-center bg-black/40 rounded-xl overflow-hidden min-h-[300px] p-2"></div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, logout } from './src/auth.js';
        import { fetchFiles, uploadFile, deleteFile, renameFile } from './src/vault.js';
        import { formatBytes, getFileMeta } from './src/utils.js';

        // 1. Jalankan Proteksi Halaman
        checkAuth();

        // State Dashboard
        let localFilesState = [];
        let currentViewMode = 'list';

        // Element Selectors
        const fileViewer = document.getElementById('fileViewer');
        const searchBar = document.getElementById('searchBar');
        const statusConsole = document.getElementById('statusConsole');
        const fInput = document.getElementById('fileInput');
        const dZone = document.getElementById('dropZone');
        const dZoneText = document.getElementById('dropZoneText');

        // Pemicu Explorer & Drag Drop Binder (PASTIKAN ANTI-NULL)
        if (dZone && fInput) {
            dZone.addEventListener('click', (e) => {
                if (e.target !== fInput) {
                    fInput.click();
                }
            });

            fInput.addEventListener('change', () => { 
                if (fInput.files.length > 0) {
                    dZoneText.innerText = `Target: ${fInput.files[0].name}`; 
                }
            });

            dZone.addEventListener('dragover', (e) => { 
                e.preventDefault(); 
                dZone.classList.add('border-cyan-500'); 
            });

            dZone.addEventListener('dragleave', () => {
                dZone.classList.remove('border-cyan-500');
            });

            dZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dZone.classList.remove('border-cyan-500');
                if (e.dataTransfer.files.length > 0) {
                    fInput.files = e.dataTransfer.files;
                    dZoneText.innerText = `Target: ${fInput.files[0].name}`;
                }
            });
        }

        // Render Controller
        async function loadAndRender() {
            fileViewer.innerHTML = `<div class="text-center py-20 text-xs tracking-widest text-cyan-400 animate-pulse font-mono">⚡ SYNCHRONIZING CLOUD DATA...</div>`;
            const result = await fetchFiles();
            
            if (result.status === "success") {
                localFilesState = result.data;
                renderFiles(localFilesState);
            } else {
                fileViewer.innerHTML = `<div class="text-center py-20 text-xs text-red-400 font-mono">❌ ERROR: ${result.message}</div>`;
            }
        }

        function renderFiles(files) {
            if (files.length === 0) {
                fileViewer.innerHTML = `<div class="text-center py-20 text-xs text-slate-500 italic font-mono">Brankas kosong melompong.</div>`;
                return;
            }

            if (currentViewMode === 'list') {
                let html = `<div class="space-y-2">`;
                files.forEach(file => {
                    const meta = getFileMeta(file.name);
                    html += `
                        <div class="flex justify-between items-center bg-black/20 border border-white/5 p-3 rounded-xl gap-4 hover:border-cyan-500/20 transition">
                            <div class="flex items-center gap-3 truncate flex-1 cursor-pointer open-preview" data-id="${file.id}">
                                <div class="p-2 rounded-lg ${meta.bg} ${meta.border} ${meta.color} text-sm">${meta.icon}</div>
                                <div class="truncate">
                                    <span class="text-xs font-medium text-slate-200 block truncate hover:text-cyan-400">${file.name}</span>
                                    <span class="text-[10px] text-slate-500">${formatBytes(file.size)}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button data-id="${file.id}" data-name="${file.name}" class="action-rename bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-white px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition cursor-pointer uppercase">Rename</button>
                                <button data-id="${file.id}" class="action-delete bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition cursor-pointer uppercase">Delete</button>
                            </div>
                        </div>`;
                });
                html += `</div>`;
                fileViewer.innerHTML = html;
            } else {
                let html = `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">`;
                files.forEach(file => {
                    const meta = getFileMeta(file.name);
                    html += `
                        <div class="bg-black/20 border border-white/5 p-4 rounded-xl flex flex-col items-center text-center justify-between gap-3 hover:border-cyan-500/20 transition relative group">
                            <div class="w-full flex flex-col items-center cursor-pointer open-preview" data-id="${file.id}">
                                <div class="text-3xl p-4 rounded-xl ${meta.bg} ${meta.border} ${meta.color} mb-2">${meta.icon}</div>
                                <span class="text-xs font-medium text-slate-200 block w-full truncate px-1 hover:text-cyan-400">${file.name}</span>
                                <span class="text-[10px] text-slate-500 mt-1">${formatBytes(file.size)}</span>
                            </div>
                            <div class="flex gap-1 w-full mt-2">
                                <button data-id="${file.id}" data-name="${file.name}" class="action-rename w-1/2 bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-white py-1 rounded-md text-[9px] font-bold transition cursor-pointer">EDIT</button>
                                <button data-id="${file.id}" class="action-delete w-1/2 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white py-1 rounded-md text-[9px] font-bold transition cursor-pointer">DEL</button>
                            </div>
                        </div>`;
                });
                html += `</div>`;
                fileViewer.innerHTML = html;
            }

            setupActionListeners();
        }

        function setupActionListeners() {
            document.querySelectorAll('.action-delete').forEach(btn => {
                btn.replaceWith(btn.cloneNode(true));
            });
            document.querySelectorAll('.action-rename').forEach(btn => {
                btn.replaceWith(btn.cloneNode(true));
            });
            document.querySelectorAll('.open-preview').forEach(div => {
                div.replaceWith(div.cloneNode(true));
            });

            document.querySelectorAll('.action-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    if (confirm("Kirim perintah penghancuran file di cloud?")) {
                        btn.innerText = "WAIT..";
                        const res = await deleteFile(id);
                        alert(res.message);
                        loadAndRender();
                    }
                });
            });

            document.querySelectorAll('.action-rename').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const oldName = btn.getAttribute('data-name');
                    const newName = prompt("Masukkan nama modifikasi file:", oldName);
                    if (newName && newName !== oldName) {
                        btn.innerText = "WAIT..";
                        const res = await renameFile(id, newName);
                        alert(res.message);
                        loadAndRender();
                    }
                });
            });

            document.querySelectorAll('.open-preview').forEach(div => {
                div.addEventListener('click', () => {
                    const id = div.getAttribute('data-id');
                    const targetFile = localFilesState.find(f => f.id === id);
                    if (targetFile) openModalViewer(targetFile);
                });
            });
        }

        searchBar.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = localFilesState.filter(f => f.name.toLowerCase().includes(keyword));
            renderFiles(filtered);
        });

        document.getElementById('uploadBtn').addEventListener('click', () => {
            const file = fInput.files[0];
            if (!file) return alert("Suntik filenya dulu bro!");

            statusConsole.classList.remove('hidden');
            uploadFile(file, 
                (progressText) => {
                    statusConsole.innerText = `CONSOLE > ${progressText}`;
                }, 
                (result) => {
                    if (result.status === "success") {
                        statusConsole.innerText = "CONSOLE > Upload complete. Syncing database...";
                        fInput.value = "";
                        dZoneText.innerText = "Drag & Drop file di sini atau klik untuk memilih";
                        setTimeout(() => { statusConsole.classList.add('hidden'); }, 2000);
                        loadAndRender();
                    } else {
                        statusConsole.innerText = `CONSOLE > ERROR: ${result.message}`;
                    }
                }
            );
        });

        function openModalViewer(file) {
            const modal = document.getElementById('previewModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.innerText = `PREVIEW INTERFACE > ${file.name}`;
            body.innerHTML = "";
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const ext = file.name.split('.').pop().toLowerCase();
            
            if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
                body.innerHTML = `<img src="${file.url}" class="max-h-[70vh] rounded-lg border border-white/5 object-contain" />`;
            } else if (['mp4', 'mkv', 'mov'].includes(ext)) {
                body.innerHTML = `<video src="${file.url}" controls class="max-h-[70vh] w-full rounded-lg" autoplay></video>`;
            } else {
                body.innerHTML = `
                    <div class="text-center p-6 space-y-4">
                        <p class="text-xs text-slate-400 font-mono">Pratinjau langsung tidak didukung untuk tipe file ini.</p>
                        <a href="${file.url}" target="_blank" class="inline-block btn-cyber px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">
                            Buka / Unduh File Direct Link 🔗
                        </a>
                    </div>`;
            }
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            const modal = document.getElementById('previewModal');
            document.getElementById('modalBody').innerHTML = "";
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        });

        document.getElementById('setViewList').addEventListener('click', () => { currentViewMode = 'list'; renderFiles(localFilesState); });
        document.getElementById('setViewGrid').addEventListener('click', () => { currentViewMode = 'grid'; renderFiles(localFilesState); });
        document.getElementById('logoutBtn').addEventListener('click', () => logout());

        loadAndRender();
    </script>
</body>
</html>
