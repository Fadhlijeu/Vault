<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%);
            color: #f8fafc;
        }
        .font-mono-cyber {
            font-family: 'Fira Code', monospace;
        }
        .cyber-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .cyber-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 32px 0 rgba(56, 189, 248, 0.05);
        }
        .btn-cyber-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-cyber-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.5);
        }
        .btn-cyber-secondary {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: #38bdf8;
            transition: all 0.3s ease;
        }
        .btn-cyber-secondary:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
        }
        .checkbox-cyber {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid rgba(56, 189, 248, 0.4);
            border-radius: 4px;
            background: rgba(15, 23, 42, 0.6);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }
        .checkbox-cyber:checked {
            background: #06b6d4;
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
        }
        .checkbox-cyber:checked::after {
            content: "✓";
            color: #020617;
            font-size: 11px;
            font-weight: bold;
        }
        /* ── Terminal CLI ── */
        #cliOutput { scrollbar-width:thin; scrollbar-color:rgba(56,189,248,.3) transparent; }
        #cliOutput::-webkit-scrollbar { width:4px; }
        #cliOutput::-webkit-scrollbar-thumb { background:rgba(56,189,248,.3); border-radius:4px; }
        #cliInput { background:transparent; outline:none; border:none; caret-color:#22d3ee; color:#e2e8f0; width:100%; }
        .cli-prompt  { color:#22d3ee; }
        .cli-success { color:#4ade80; }
        .cli-error   { color:#f87171; }
        .cli-info    { color:#94a3b8; }
        .cli-warn    { color:#fbbf24; }
        .cli-folder  { color:#38bdf8; }
        .cli-file    { color:#e2e8f0; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .cursor-blink { display:inline-block; animation:blink 1s step-end infinite; }
        /* Floating terminal panel */
        #terminalPanel {
            position:fixed; bottom:80px; right:24px; width:min(640px,95vw);
            transform:translateY(20px); opacity:0; pointer-events:none;
            transition:all .3s cubic-bezier(.4,0,.2,1); z-index:900;
        }
        #terminalPanel.open { transform:translateY(0); opacity:1; pointer-events:all; }
        #termFab {
            position:fixed; bottom:24px; right:24px; z-index:901;
            width:52px; height:52px; border-radius:50%;
            background:linear-gradient(135deg,#06b6d4,#3b82f6);
            box-shadow:0 0 20px rgba(6,182,212,.5);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; border:none; transition:all .3s ease;
            font-size:1.3rem;
        }
        #termFab:hover { transform:scale(1.1); box-shadow:0 0 30px rgba(6,182,212,.7); }
        /* ── Toast Notifications ── */
        #toastContainer { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
        .toast {
            display:flex; align-items:flex-start; gap:12px;
            padding:14px 18px; border-radius:14px; min-width:280px; max-width:360px;
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            box-shadow:0 8px 32px rgba(0,0,0,.4);
            animation:toastIn .35s cubic-bezier(.4,0,.2,1) forwards;
            pointer-events:all;
            font-family:'Outfit',sans-serif; font-size:13px;
        }
        .toast.success { background:rgba(4,47,27,.85); border:1px solid rgba(74,222,128,.3); color:#4ade80; }
        .toast.error   { background:rgba(69,10,10,.85); border:1px solid rgba(248,113,113,.3); color:#f87171; }
        .toast.info    { background:rgba(8,47,73,.85); border:1px solid rgba(56,189,248,.3); color:#38bdf8; }
        .toast.warn    { background:rgba(69,42,0,.85); border:1px solid rgba(251,191,36,.3); color:#fbbf24; }
        .toast-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
        .toast-msg  { flex:1; line-height:1.5; color:#f8fafc; }
        .toast-msg strong { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:2px; }
        .toast-close { background:none; border:none; cursor:pointer; opacity:.5; transition:opacity .2s; font-size:16px; color:inherit; padding:0; line-height:1; }
        .toast-close:hover { opacity:1; }
        @keyframes toastIn  { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(40px)} }
        /* ── Styled Dialog ── */
        #dialogOverlay {
            position:fixed; inset:0; z-index:9990;
            background:rgba(2,6,23,.8); backdrop-filter:blur(6px);
            display:none; align-items:center; justify-content:center; padding:16px;
        }
        #dialogOverlay.show { display:flex; }
        #dialogBox {
            background:rgba(15,23,42,.95); border:1px solid rgba(56,189,248,.2);
            border-radius:20px; padding:28px; width:100%; max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,.6);
            animation:toastIn .25s ease;
            font-family:'Outfit',sans-serif;
        }
        #dialogBox h4 { font-size:14px; font-weight:700; color:#38bdf8; margin-bottom:8px; }
        #dialogBox p  { font-size:12px; color:#94a3b8; margin-bottom:16px; line-height:1.6; }
        #dialogInput  { width:100%; padding:10px 14px; border-radius:10px; border:1px solid rgba(56,189,248,.25);
                        background:rgba(2,6,23,.6); color:#f8fafc; font-size:13px; outline:none;
                        font-family:'Fira Code',monospace; margin-bottom:16px; }
        #dialogInput:focus { border-color:#38bdf8; }
        .dialog-actions { display:flex; gap:10px; justify-content:flex-end; }
        .dialog-btn-cancel { padding:8px 18px; border-radius:10px; border:1px solid rgba(255,255,255,.1);
                             background:transparent; color:#94a3b8; font-size:12px; cursor:pointer;
                             font-weight:600; transition:all .2s; }
        .dialog-btn-cancel:hover { background:rgba(255,255,255,.05); color:#f8fafc; }
        .dialog-btn-ok { padding:8px 20px; border-radius:10px; border:none;
                         background:linear-gradient(135deg,#06b6d4,#3b82f6);
                         color:white; font-size:12px; font-weight:700; cursor:pointer;
                         box-shadow:0 0 14px rgba(6,182,212,.35); transition:all .2s; }
        .dialog-btn-ok:hover { box-shadow:0 0 22px rgba(6,182,212,.6); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="cyber-card flex flex-col sm:flex-row justify-between items-center p-5 rounded-2xl gap-4">
            <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#22d3ee]"></div>
                <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-sky-400 to-blue-500">
                    CYBER VAULT CONTROL PANEL
                </h1>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button id="logoutBtn" class="w-full sm:w-auto px-4 py-2 border border-red-500/30 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white rounded-xl text-xs font-semibold tracking-wider transition cursor-pointer uppercase">
                    Disconnect Vault
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Left Panel (Upload & Directory Actions) -->
            <div class="cyber-card p-5 rounded-2xl space-y-5 h-fit">
                <h2 class="text-xs font-bold text-cyan-400 uppercase tracking-widest border-b border-white/5 pb-2">📤 File & Folder Manager</h2>
                
                <!-- Create Folder Button -->
                <button id="createFolderBtn" class="btn-cyber-secondary w-full py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer flex items-center justify-center gap-2">
                    📁 Buat Folder Baru
                </button>
                
                <!-- Multi-upload Dropzone -->
                <div id="dropZone" class="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-cyan-500/20 hover:border-cyan-400/50 rounded-xl cursor-pointer hover:bg-cyan-500/5 transition p-4 text-center">
                    <p class="text-xs font-semibold text-slate-400" id="dropZoneText">Drag & Drop file di sini atau klik untuk memilih</p>
                    <p class="text-[10px] text-slate-500 mt-1">Mendukung unggahan banyak file sekaligus</p>
                    <input type="file" id="fileInput" class="hidden" multiple />
                </div>
                
                <button id="uploadBtn" class="btn-cyber-primary w-full py-3 rounded-xl text-xs font-bold uppercase text-white tracking-wider cursor-pointer">
                    Execute Bulk Upload 🚀
                </button>
                
                <div id="statusConsole" class="hidden text-xs p-3 rounded-xl border border-white/5 bg-black/40 font-mono-cyber text-slate-400 space-y-1 max-h-48 overflow-y-auto"></div>
            </div>

            <!-- Right Panel (File Explorer) -->
            <div class="lg:col-span-3 cyber-card p-5 rounded-2xl space-y-4">
                
                <!-- Navigation & Breadcrumbs -->
                <div class="flex flex-wrap items-center justify-between gap-4 border-b border-white/5 pb-3">
                    <div class="flex items-center gap-2 text-xs font-semibold">
                        <span class="text-slate-500">Path:</span>
                        <div id="breadcrumbs" class="flex items-center gap-1.5 text-cyan-400 font-mono-cyber">
                            <!-- Dynamically generated breadcrumbs -->
                            <span class="cursor-pointer hover:text-white" id="navRoot">Root</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <input type="text" id="searchBar" placeholder="Cari file/folder..." 
                               class="input-cyber px-4 py-2 rounded-xl text-xs w-48 sm:w-60 bg-slate-950/60 border border-cyan-500/20 focus:border-cyan-400 outline-none text-slate-200">
                        
                        <div class="flex items-center gap-1">
                            <button id="setViewList" class="p-2 border border-white/5 bg-white/5 hover:bg-cyan-500/10 rounded-lg text-xs font-bold hover:text-cyan-400 transition cursor-pointer">📝</button>
                            <button id="setViewGrid" class="p-2 border border-white/5 bg-white/5 hover:bg-cyan-500/10 rounded-lg text-xs font-bold hover:text-cyan-400 transition cursor-pointer">📱</button>
                        </div>
                    </div>
                </div>

                <!-- Bulk Action Bar (Hidden by default) -->
                <div id="bulkActionBar" class="hidden flex items-center justify-between p-3 rounded-xl border border-cyan-500/20 bg-cyan-500/5">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="selectAllCheckbox" class="checkbox-cyber">
                        <label for="selectAllCheckbox" class="text-xs font-semibold text-slate-300 cursor-pointer">Pilih Semua</label>
                        <span id="selectedCountText" class="text-xs text-cyan-400 font-mono-cyber font-semibold">0 terpilih</span>
                    </div>
                    <button id="bulkDeleteBtn" class="px-3 py-1.5 bg-red-500/20 hover:bg-red-500 border border-red-500/30 hover:border-red-500 text-red-400 hover:text-white rounded-lg text-xs font-bold tracking-wider transition cursor-pointer uppercase">
                        Hapus Terpilih 🗑️
                    </button>
                </div>

                <!-- File Viewer Container -->
                <div id="fileViewer" class="min-h-[400px]">
                    <!-- Dynamically loaded grid or list -->
                </div>
            </div>

        </div>

    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Styled Dialog -->
    <div id="dialogOverlay">
        <div id="dialogBox">
            <h4 id="dialogTitle">Konfirmasi</h4>
            <p id="dialogMessage"></p>
            <input id="dialogInput" type="text" class="hidden" placeholder="" />
            <div class="dialog-actions">
                <button class="dialog-btn-cancel" id="dialogCancel">Batal</button>
                <button class="dialog-btn-ok" id="dialogOk">OK</button>
            </div>
        </div>
    </div>

    <!-- Floating Terminal Panel -->
    <div id="terminalPanel" class="cyber-card rounded-2xl overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-cyan-500/10 bg-black/40">
            <div class="flex items-center gap-3">
                <div class="flex gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-red-500/70"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/70"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/70"></div>
                </div>
                <span class="text-xs font-semibold text-cyan-400 font-mono-cyber tracking-widest">VAULT://TERMINAL</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="cliClearBtn" class="text-[10px] text-slate-500 hover:text-cyan-400 font-mono-cyber transition cursor-pointer">clear</button>
                <button id="termClose" class="text-slate-500 hover:text-white text-lg leading-none cursor-pointer">&times;</button>
            </div>
        </div>
        <div id="cliOutput" class="font-mono-cyber text-xs p-4 h-72 overflow-y-auto space-y-1 bg-black/70"></div>
        <div class="flex items-center gap-2 px-4 py-3 border-t border-cyan-500/10 bg-black/60">
            <span class="cli-prompt font-mono-cyber text-xs select-none">vault@cyber:~$</span>
            <input id="cliInput" type="text" class="font-mono-cyber text-xs flex-1" placeholder="help — daftar perintah" autocomplete="off" spellcheck="false">
            <span class="cursor-blink cli-prompt font-mono-cyber text-sm">▮</span>
        </div>
    </div>

    <!-- Floating Terminal FAB -->
    <button id="termFab" title="Buka Terminal">⌨️</button>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div class="cyber-card w-full max-w-3xl p-6 rounded-2xl space-y-4 relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl font-bold cursor-pointer transition">&times;</button>
            <h3 id="modalTitle" class="text-sm font-semibold truncate pr-8 text-cyan-400 font-mono-cyber">Preview File</h3>
            <div id="modalBody" class="w-full flex justify-center items-center bg-black/40 rounded-xl overflow-hidden min-h-[300px] p-2"></div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, logout } from './src/auth.js';
        import { fetchFiles, uploadFile, deleteFile, renameFile, fetchFileBlob, createFolder, deleteMultiple } from './src/vault.js';
        import { formatBytes, getFileMeta } from './src/utils.js';

        // ==================== TOAST & DIALOG ENGINE ====================
        const toastContainer = document.getElementById('toastContainer');
        const dialogOverlay  = document.getElementById('dialogOverlay');
        const dialogTitle    = document.getElementById('dialogTitle');
        const dialogMessage  = document.getElementById('dialogMessage');
        const dialogInput    = document.getElementById('dialogInput');
        const dialogOk       = document.getElementById('dialogOk');
        const dialogCancel   = document.getElementById('dialogCancel');

        function toast(message, type = 'info', duration = 4000) {
            const icons = { success:'✅', error:'❌', info:'ℹ️', warn:'⚠️' };
            const labels = { success:'Berhasil', error:'Error', info:'Info', warn:'Peringatan' };
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <span class="toast-msg"><strong>${labels[type]}</strong>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
            toastContainer.appendChild(el);
            setTimeout(() => {
                el.style.animation = 'toastOut .35s ease forwards';
                setTimeout(() => el.remove(), 350);
            }, duration);
        }

        function showDialog(title, message, { hasInput = false, inputDefault = '', inputPlaceholder = '' } = {}) {
            return new Promise((resolve) => {
                dialogTitle.textContent = title;
                dialogMessage.textContent = message;
                dialogInput.value = inputDefault;
                dialogInput.placeholder = inputPlaceholder;
                dialogInput.classList.toggle('hidden', !hasInput);
                dialogOverlay.classList.add('show');
                if (hasInput) setTimeout(() => dialogInput.focus(), 50);

                const cleanup = () => { dialogOverlay.classList.remove('show'); };
                dialogOk.onclick = () => { cleanup(); resolve(hasInput ? dialogInput.value.trim() : true); };
                dialogCancel.onclick = () => { cleanup(); resolve(null); };
                dialogInput.onkeydown = (e) => { if (e.key === 'Enter') dialogOk.click(); if (e.key === 'Escape') dialogCancel.click(); };
            });
        }
        // ==================== END TOAST & DIALOG ENGINE ====================

        // ==================== VAULT CLI ENGINE ====================
        const cliOutput   = document.getElementById('cliOutput');
        const cliInput    = document.getElementById('cliInput');
        const cliClearBtn = document.getElementById('cliClearBtn');
        const termFab     = document.getElementById('termFab');
        const termPanel   = document.getElementById('terminalPanel');
        const termClose   = document.getElementById('termClose');
        let cliHistory = [], cliHistoryIdx = -1;
        let cliCurrentFolder = { id: null, name: 'root' };
        let cliParentStack  = [];

        // FAB Toggle
        termFab.addEventListener('click', () => {
            termPanel.classList.toggle('open');
            if (termPanel.classList.contains('open')) cliInput.focus();
        });
        termClose.addEventListener('click', () => termPanel.classList.remove('open'));

        function cliPrint(text) {
            const line = document.createElement('div');
            line.innerHTML = text;
            cliOutput.appendChild(line);
            cliOutput.scrollTop = cliOutput.scrollHeight;
        }
        function cliSep() { cliPrint('<span class="cli-info">─────────────────────────────────────</span>'); }

        cliPrint('<span class="cli-prompt">⚡ Vault CLI v2.0 — ketik <strong>help</strong> untuk panduan</span>');
        cliSep();

        const CLI_COMMANDS = {
            help: async () => {
                cliPrint('<span class="cli-warn">Daftar perintah:</span>');
                [
                    ['ls [folder-id?]',          'Tampilkan isi folder'],
                    ['cd [folder-id | ..]',       'Navigasi folder'],
                    ['pwd',                       'Folder aktif saat ini'],
                    ['mkdir [nama]',              'Buat folder baru'],
                    ['rm [id]',                   'Hapus file/folder'],
                    ['rename [id] [nama baru]',   'Ganti nama item'],
                    ['git status',                'Info vault & sesi saat ini'],
                    ['git log',                   'Riwayat file terbaru'],
                    ['git push',                  'Info cara push via drive.bat'],
                    ['curl -o [nama] [url]',      'Download file dari URL ke vault'],
                    ['clear',                     'Bersihkan terminal'],
                ].forEach(([cmd, desc]) => {
                    cliPrint(`  <span class="cli-prompt">${cmd.padEnd(30)}</span><span class="cli-info">${desc}</span>`);
                });
            },

            pwd: async () => {
                cliPrint(`<span class="cli-info">Direktori: </span><span class="cli-prompt">${cliCurrentFolder.name}</span><span class="cli-info"> [${cliCurrentFolder.id || 'root'}]</span>`);
            },

            ls: async (args) => {
                cliPrint('<span class="cli-info">Memuat...</span>');
                const result = await fetchFiles(args[0] || cliCurrentFolder.id);
                if (result.status !== 'success') { cliPrint(`<span class="cli-error">Error: ${result.message}</span>`); return; }
                if (!result.data.length) { cliPrint('<span class="cli-info">Folder kosong.</span>'); return; }
                cliPrint(`<span class="cli-info">${result.data.length} item di <strong>${result.currentFolderName}</strong></span>`);
                cliSep();
                result.data.forEach(item => {
                    const icon = item.isFolder ? '📁' : '📄';
                    const cls  = item.isFolder ? 'cli-folder' : 'cli-file';
                    const size = item.isFolder ? '<DIR>  ' : formatBytes(item.size);
                    cliPrint(`  ${icon} <span class="${cls}">${item.name}</span> <span class="cli-info">(${size}) [${item.id}]</span>`);
                });
            },

            cd: async (args) => {
                if (!args[0]) { cliPrint('<span class="cli-error">Penggunaan: cd [folder-id] | cd ..</span>'); return; }
                if (args[0] === '..') {
                    if (!cliParentStack.length) { cliPrint('<span class="cli-warn">Sudah di root.</span>'); return; }
                    cliCurrentFolder = cliParentStack.pop();
                    cliPrint(`<span class="cli-success">↑ Kembali ke: ${cliCurrentFolder.name}</span>`);
                    return;
                }
                const result = await fetchFiles(args[0]);
                if (result.status !== 'success') { cliPrint(`<span class="cli-error">Error: ${result.message}</span>`); return; }
                cliParentStack.push({ ...cliCurrentFolder });
                cliCurrentFolder = { id: result.currentFolderId, name: result.currentFolderName };
                cliPrint(`<span class="cli-success">→ Masuk ke: ${result.currentFolderName}</span>`);
            },

            mkdir: async (args) => {
                const name = args.join(' ');
                if (!name) { cliPrint('<span class="cli-error">Penggunaan: mkdir [nama]</span>'); return; }
                const result = await createFolder(name, cliCurrentFolder.id);
                if (result.status === 'success') {
                    cliPrint(`<span class="cli-success">✓ Folder "${name}" dibuat! ID: ${result.data.id}</span>`);
                } else { cliPrint(`<span class="cli-error">✗ ${result.message}</span>`); }
            },

            rm: async (args) => {
                if (!args[0]) { cliPrint('<span class="cli-error">Penggunaan: rm [id]</span>'); return; }
                cliPrint(`<span class="cli-warn">Menghapus ${args[0]}...</span>`);
                const result = await deleteFile(args[0]);
                cliPrint(result.status === 'success'
                    ? `<span class="cli-success">✓ Dihapus.</span>`
                    : `<span class="cli-error">✗ ${result.message}</span>`);
            },

            rename: async (args) => {
                const [id, ...rest] = args;
                const newName = rest.join(' ');
                if (!id || !newName) { cliPrint('<span class="cli-error">Penggunaan: rename [id] [nama baru]</span>'); return; }
                const result = await renameFile(id, newName);
                cliPrint(result.status === 'success'
                    ? `<span class="cli-success">✓ Diganti menjadi "${newName}"</span>`
                    : `<span class="cli-error">✗ ${result.message}</span>`);
            },

            git: async (args) => {
                const sub = (args[0] || '').toLowerCase();
                if (sub === 'status') {
                    const cfg  = JSON.parse(localStorage.getItem('vault_config') || '{}');
                    const url  = localStorage.getItem('vault_api_url') || 'N/A';
                    cliPrint('<span class="cli-warn">== VAULT GIT STATUS ==</span>');
                    cliPrint(`  <span class="cli-info">Vault Name  : </span><span class="cli-prompt">${cfg.vaultName || 'Cyber Vault'}</span>`);
                    cliPrint(`  <span class="cli-info">Backend URL : </span><span class="cli-file">${url.substring(0,60)}...</span>`);
                    cliPrint(`  <span class="cli-info">Folder      : </span><span class="cli-prompt">${cliCurrentFolder.name}</span>`);
                    cliPrint(`  <span class="cli-info">Max Size    : </span><span class="cli-prompt">${cfg.maxFileSizeMB || 15} MB</span>`);
                } else if (sub === 'log') {
                    cliPrint('<span class="cli-info">Mengambil daftar file terbaru...</span>');
                    const result = await fetchFiles(cliCurrentFolder.id);
                    if (result.status !== 'success') { cliPrint(`<span class="cli-error">${result.message}</span>`); return; }
                    cliPrint('<span class="cli-warn">== VAULT LOG (folder aktif) ==</span>');
                    result.data.slice(0, 10).forEach((item, i) => {
                        cliPrint(`  <span class="cli-info">#${String(i+1).padStart(2,'0')}</span> <span class="cli-prompt">${item.name}</span> <span class="cli-info">[${item.id}]</span>`);
                    });
                } else if (sub === 'push') {
                    cliPrint('<span class="cli-warn">Untuk push project ke Google Drive, gunakan drive.bat di terminal lokal:</span>');
                    cliPrint('  <span class="cli-file">drive push "pesan commit"</span>');
                    cliPrint('<span class="cli-info">Pastikan d:\\vault sudah ada di PATH environment variables Windows Anda.</span>');
                } else {
                    cliPrint('<span class="cli-error">Perintah git yang tersedia: status | log | push</span>');
                }
            },

            curl: async (args) => {
                // Format: curl -o [nama_file] [url]
                let fileName = null, url = null;
                const oIdx = args.indexOf('-o');
                if (oIdx !== -1 && args[oIdx + 1] && args[oIdx + 2]) {
                    fileName = args[oIdx + 1];
                    url = args[oIdx + 2];
                } else if (args[0] && !args[0].startsWith('-')) {
                    url = args[0];
                    fileName = url.split('/').pop().split('?')[0] || 'download';
                }
                if (!url) { cliPrint('<span class="cli-error">Penggunaan: curl -o [nama_file] [url]</span>'); return; }
                cliPrint(`<span class="cli-info">Menginstruksikan backend untuk mengunduh: ${url.substring(0,60)}</span>`);
                cliPrint('<span class="cli-warn">⚠ Fitur curl-to-vault memerlukan endpoint backend tambahan (belum aktif).</span>');
                cliPrint('<span class="cli-info">Untuk sekarang, gunakan fitur Upload di panel kiri untuk mengunggah file secara manual.</span>');
            },

            clear: async () => { cliOutput.innerHTML = ''; },
        };

        cliInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const raw = cliInput.value.trim();
                if (!raw) return;
                cliHistory.unshift(raw);
                if (cliHistory.length > 50) cliHistory.pop();
                cliHistoryIdx = -1;
                cliPrint(`<span class="cli-prompt">vault@cyber:~$ </span><span>${raw}</span>`);
                cliInput.value = '';
                const parts = raw.trim().split(/\s+/);
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1);
                if (CLI_COMMANDS[cmd]) { await CLI_COMMANDS[cmd](args); }
                else { cliPrint(`<span class="cli-error">Command tidak dikenali: '${cmd}'. Ketik help.</span>`); }
            }
            if (e.key === 'ArrowUp') { e.preventDefault(); if (cliHistoryIdx < cliHistory.length - 1) { cliHistoryIdx++; cliInput.value = cliHistory[cliHistoryIdx]; } }
            if (e.key === 'ArrowDown') { e.preventDefault(); if (cliHistoryIdx > 0) { cliHistoryIdx--; cliInput.value = cliHistory[cliHistoryIdx]; } else { cliHistoryIdx = -1; cliInput.value = ''; } }
        });
        cliClearBtn.addEventListener('click', () => cliOutput.innerHTML = '');
        cliOutput.addEventListener('click', () => cliInput.focus());
        // ==================== END CLI ENGINE ====================




        // 1. Jalankan Proteksi Halaman
        checkAuth();

        // Render Controller & API Loader
        async function loadAndRender(folderId = null) {
            // Sembunyikan bulk action bar ketika berpindah direktori
            bulkActionBar.classList.add('hidden');
            selectAllCheckbox.checked = false;

            const result = await fetchFiles(folderId);

                localFilesState = result.data.map(item => ({ ...item, selected: false }));
                currentFolderId = result.currentFolderId;
                parentFolderId = result.parentFolderId;
                
                updateBreadcrumbs(result.currentFolderName, result.currentFolderId);

                fileViewer.innerHTML = `<div class="text-center py-20 text-xs text-red-400 font-mono-cyber">❌ ERROR: ${result.message}</div>`;

        // Update Breadcrumb Trail

            if (!currentId || currentId === localStorage.getItem('vault_config_root_id')) {
                folderPathHistory = [];

            // Cari apakah folder sudah ada di history
            const idx = folderPathHistory.findIndex(f => f.id === currentId);
            if (idx !== -1) {
                // Potong history jika mengklik breadcrumb sebelumnya
                folderPathHistory = folderPathHistory.slice(0, idx + 1);
            } else if (currentId && currentName !== "Cyber Vault Data Store") {
                // Tambah baru
                folderPathHistory.push({ id: currentId, name: currentName });
            }

            let html = `<span class="cursor-pointer hover:text-white" id="navRoot">Root</span>`;

            document.getElementById('navRoot').addEventListener('click', () => {

                loadAndRender(null);

        // Action Bindings (Navigasi, Rename, Hapus, Checkbox)
        function setupActionListeners() {
            // 1. Aksi Masuk Folder
            document.querySelectorAll('.open-folder').forEach(element => {
                element.addEventListener('click', () => {
                    const folderId = element.getAttribute('data-id');
                    loadAndRender(folderId);
                });
            });

            // 2. Aksi Buka Preview File
            document.querySelectorAll('.open-preview').forEach(element => {
                element.addEventListener('click', () => {
                    const id = element.getAttribute('data-id');
                    const targetFile = localFilesState.find(f => f.id === id);
                    if (targetFile) openModalViewer(targetFile);
                });
            });

            // 3. Aksi Rename (File/Folder)
            document.querySelectorAll('.action-rename').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const oldName = btn.getAttribute('data-name');
                    const newName = await showDialog('Rename Item', `Masukkan nama baru untuk "${oldName}"`, { hasInput: true, inputDefault: oldName, inputPlaceholder: 'Nama baru...' });
                    if (newName && newName !== oldName) {
                        btn.innerText = 'WAIT..';
                        const res = await renameFile(id, newName);
                        toast(res.message, res.status === 'success' ? 'success' : 'error');
                        loadAndRender(currentFolderId);
                    }
                });
            });

            // 4. Aksi Delete (File/Folder)
            document.querySelectorAll('.action-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const name = btn.getAttribute('data-name') || id;
                    const confirmed = await showDialog('Konfirmasi Hapus', `Kirim perintah penghancuran item "${name}" ke cloud Google Drive?`);
                    if (confirmed) {
                        btn.innerText = 'WAIT..';
                        const res = await deleteFile(id);
                        toast(res.message, res.status === 'success' ? 'success' : 'error');
                        loadAndRender(currentFolderId);
                    }
                });
            });

            // 5. Aksi Checkbox Pemilihan Item (Bulk Select)
            document.querySelectorAll('.item-select-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const index = parseInt(checkbox.getAttribute('data-index'));
                    localFilesState[index].selected = checkbox.checked;
                    updateBulkActionBar();
                });
            });
        }

        // Update bulk action bar visibility and count
        function updateBulkActionBar() {
            const selectedItems = localFilesState.filter(item => item.selected);
            if (selectedItems.length > 0) {
                bulkActionBar.classList.remove('hidden');
                selectedCountText.innerText = `${selectedItems.length} terpilih`;
                
                // Set state Select All checkbox
                selectAllCheckbox.checked = (selectedItems.length === localFilesState.length);
            } else {
                bulkActionBar.classList.add('hidden');
                selectAllCheckbox.checked = false;
            }
        }

        // Select All Handler
        selectAllCheckbox.addEventListener('change', () => {
            const isChecked = selectAllCheckbox.checked;
            localFilesState.forEach(item => {
                item.selected = isChecked;
            });
            document.querySelectorAll('.item-select-checkbox').forEach(cb => {
                cb.checked = isChecked;
            });
            updateBulkActionBar();
        });

        // Bulk Delete Executer
        bulkDeleteBtn.addEventListener('click', async () => {
            const selectedItems = localFilesState.filter(item => item.selected);
            if (!selectedItems.length) return;
            const confirmed = await showDialog('Bulk Delete', `Hancurkan ${selectedItems.length} item terpilih secara permanen di Google Drive?`);
            if (confirmed) {
                bulkDeleteBtn.innerText = 'DESTROYING...';
                bulkDeleteBtn.disabled = true;
                const fileIds   = selectedItems.filter(i => !i.isFolder).map(i => i.id);
                const folderIds = selectedItems.filter(i =>  i.isFolder).map(i => i.id);
                const res = await deleteMultiple(fileIds, folderIds);
                toast(res.message, res.status === 'success' ? 'success' : 'error');
                bulkDeleteBtn.innerText = 'Hapus Terpilih 🗑️';
                bulkDeleteBtn.disabled = false;
                loadAndRender(currentFolderId);
            }
        });

        createFolderBtn.addEventListener('click', async () => {
            const folderName = await showDialog('Buat Folder Baru', 'Masukkan nama folder yang ingin dibuat:', { hasInput: true, inputPlaceholder: 'Nama folder...' });
            if (folderName) {
                const res = await createFolder(folderName, currentFolderId);
                toast(res.message, res.status === 'success' ? 'success' : 'error');
                loadAndRender(currentFolderId);
            }
        });

        // Search Engine
        searchBar.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = localFilesState.filter(f => f.name.toLowerCase().includes(keyword));
            renderFiles(filtered);
        });

        // Bulk Upload Queue Executer
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const files = fInput.files;
            if (!files.length) return toast('Pilih file terlebih dahulu!', 'warn');

            statusConsole.classList.remove('hidden');
            statusConsole.innerHTML = "";

            const logMessage = (msg) => {
                statusConsole.innerHTML += `<div>CONSOLE > ${msg}</div>`;
                statusConsole.scrollTop = statusConsole.scrollHeight;
            };

            logMessage(`Memulai proses bulk upload untuk ${files.length} file...`);

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                logMessage(`[${i+1}/${files.length}] Mempersiapkan file: ${file.name}`);
                
                await new Promise((resolve) => {
                    uploadFile(file, currentFolderId, 
                        (progressText) => {
                            logMessage(`[${i+1}/${files.length}] status: ${progressText}`);
                        }, 
                        (result) => {
                            if (result.status === "success") {
                                logMessage(`[${i+1}/${files.length}] Berhasil: ${file.name}`);
                            } else {
                                logMessage(`[${i+1}/${files.length}] Gagal: ${result.message}`);
                            }
                            resolve();
                        }
                    );
                });
            }

            logMessage("Bulk upload selesai! Sinkronisasi database...");
            fInput.value = "";
            dZoneText.innerText = "Drag & Drop file di sini atau klik untuk memilih";
            
            setTimeout(() => { 
                statusConsole.classList.add('hidden'); 
            }, 5000);
            
            loadAndRender(currentFolderId);
        });

        // Preview Modal Viewer (Media Handshake)
        async function openModalViewer(file) {
            const modal = document.getElementById('previewModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.innerText = `PREVIEW INTERFACE > ${file.name}`;
            body.innerHTML = `<div class="text-center py-20 text-xs tracking-widest text-cyan-400 animate-pulse font-mono-cyber">⚡ LOADING SECURE STREAM...</div>`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const ext = file.name.split('.').pop().toLowerCase();
            
            if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
                const blob = await fetchFileBlob(file.id);
                if (blob) {
                    const objectUrl = URL.createObjectURL(blob);
                    body.innerHTML = `<img src="${objectUrl}" class="max-h-[70vh] rounded-lg border border-cyan-500/10 object-contain" />`;
                } else {
                    body.innerHTML = `<div class="text-center py-20 text-xs text-red-400 font-mono-cyber">❌ Gagal memuat pratinjau gambar.</div>`;
                }
            } else if (['mp4', 'mkv', 'mov'].includes(ext)) {
                const blob = await fetchFileBlob(file.id);
                if (blob) {
                    const objectUrl = URL.createObjectURL(blob);
                    body.innerHTML = `<video src="${objectUrl}" controls class="max-h-[70vh] w-full rounded-lg" autoplay></video>`;
                } else {
                    body.innerHTML = `<div class="text-center py-20 text-xs text-red-400 font-mono-cyber">❌ Gagal memuat pratinjau video.</div>`;
                }
            } else {
                body.innerHTML = `
                    <div class="text-center p-6 space-y-4">
                        <p class="text-xs text-slate-400 font-mono-cyber">Pratinjau langsung tidak didukung untuk tipe file ini.</p>
                        <a href="${file.url}" target="_blank" class="inline-block btn-cyber-primary px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider text-white">
                            Buka / Unduh File Direct Link 🔗
                        </a>
                    </div>`;
            }
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            const modal = document.getElementById('previewModal');
            document.getElementById('modalBody').innerHTML = "";
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        });

        // View Mode Switchers
        document.getElementById('setViewList').addEventListener('click', () => { currentViewMode = 'list'; renderFiles(localFilesState); });
        document.getElementById('setViewGrid').addEventListener('click', () => { currentViewMode = 'grid'; renderFiles(localFilesState); });
        
        // Disconnect Button
        document.getElementById('logoutBtn').addEventListener('click', () => logout());
