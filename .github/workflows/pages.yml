name: Deploy static site to Pages

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend only
        uses: actions/checkout@v4
        with:
          submodules: false # skip backend private

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # ⬅️ root folder, bisa diganti ./dist kalau ada build output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
