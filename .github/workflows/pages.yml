name: Deploy static site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write # ⬅️ ini yang diminta error log

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend only
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # root repo, ganti kalau ada folder build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
